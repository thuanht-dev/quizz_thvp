<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THVP Quiz – Chọn module</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="home.html">THVP <span>Quiz</span></a>
      <nav class="top-nav">
        <a class="btn btn-ghost" href="home.html">Trang chủ</a>
        <a class="btn btn-soft" href="index.html">Quiz</a>
      </nav>
    </header>

    <p class="eyebrow">Ôn trắc nghiệm</p>
    <h1>Chọn module để làm quiz</h1>
    <p class="lede">
      Nên xem <a href="home.html"><strong>slides lý thuyết</strong></a> trước.
      Chọn đáp án là xem ngay kết quả + giải thích.
    </p>
    <div class="module-grid" id="modules"></div>
    <p class="footer-note">720 câu · 6 module</p>
  </div>

  <script src="quiz-data.js"></script>
  <script>
    const root = document.getElementById("modules");
    const data = window.QUIZ_DATA;
    root.innerHTML = data.modules
      .map(
        (m) => `
      <a class="module-card" href="quiz.html?module=${m.id}">
        <div class="num">${m.id}</div>
        <h2>${m.title}</h2>
        <p>Chọn đáp án → xem ngay đúng/sai và kiến thức.</p>
        <div class="meta">${m.questions.length} câu hỏi</div>
      </a>`
      )
      .join("");
  </script>
</body>
</html>
