<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THVP Quiz – Chọn module</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="home.css" />
</head>
<body data-auth-boot="home">
  <div class="wrap home-wrap">
    <header class="home-bar">
      <a class="brand" href="home.html">THVP <span>Quiz</span></a>
      <div class="home-bar-actions" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
        <a class="home-link" href="admin.html">GV</a>
        <a class="home-link" href="home.html">Trang chủ</a>
      </div>
    </header>

    <section class="home-intro">
      <p class="eyebrow">Ôn trắc nghiệm</p>
      <h1>Chọn bài làm</h1>
      <p class="lede">Đề tổng hợp 50 câu, hoặc quiz đủ 120 câu theo từng module.</p>
    </section>

    <section class="path-grid">
      <a class="path-tile path-mixed" href="quiz.html?mode=mixed">
        <span class="path-n">★</span>
        <div class="path-body">
          <strong>Đề tổng hợp</strong>
          <span>50 câu ngẫu nhiên / lần</span>
          <em id="mixed-meta">Ngân hàng câu hỏi</em>
        </div>
        <span class="path-go">Bắt đầu →</span>
      </a>
    </section>

    <section class="parts">
      <div class="parts-head">
        <h2>Theo module</h2>
        <p>120 câu / module</p>
      </div>
      <div class="parts-list" id="modules"></div>
    </section>

    <p class="footer-note">720 câu module · Đề tổng hợp 50 câu/lần</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="quiz-data.js"></script>
  <script src="whats-new.js"></script>
  <script>
    const root = document.getElementById("modules");
    const data = window.QUIZ_DATA;
    const mixed = data.mixed;

    if (mixed) {
      document.getElementById("mixed-meta").textContent =
        `${mixed.questions.length} câu · mỗi lần ${mixed.drawCount}`;
    }

    function progressFor(id) {
      try {
        const raw = localStorage.getItem(`thvp-quiz-m${id}`);
        if (!raw) return 0;
        return Object.keys(JSON.parse(raw)?.answers || {}).length;
      } catch {
        return 0;
      }
    }

    root.innerHTML = data.modules
      .map((m, idx) => {
        const done = progressFor(m.id);
        const status = done > 0 ? `Đã làm ${done}/${m.questions.length}` : `${m.questions.length} câu`;
        return `
        <article class="part-row" style="--i:${idx}">
          <div class="part-index">${String(m.id).padStart(2, "0")}</div>
          <div class="part-main">
            <div class="part-title-row">
              <h3>${m.title}</h3>
              <span class="part-sub">${status}</span>
            </div>
            <div class="part-actions">
              <a class="part-slides" href="quiz.html?module=${m.id}">${done > 0 ? "Tiếp tục" : "Làm quiz"}</a>
            </div>
          </div>
        </article>`;
      })
      .join("");
  </script>
</body>
</html>
