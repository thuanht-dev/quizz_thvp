<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THVP Quiz – Chọn module</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="home.html">THVP <span>Quiz</span></a>
      <nav class="top-nav">
        <a class="btn btn-ghost" href="home.html">Trang chủ</a>
      </nav>
    </header>

    <p class="eyebrow">Ôn trắc nghiệm</p>
    <h1>Chọn module</h1>
    <p class="lede">Chọn đáp án → xem ngay đúng/sai + giải thích. Nên xem slides trên trang chủ trước.</p>
    <div class="module-grid" id="modules"></div>
    <p class="footer-note">720 câu · 6 module</p>
  </div>

  <script src="quiz-data.js"></script>
  <script>
    const root = document.getElementById("modules");
    const data = window.QUIZ_DATA;

    function progressFor(id) {
      try {
        const raw = localStorage.getItem(`thvp-quiz-m${id}`);
        if (!raw) return 0;
        return Object.keys(JSON.parse(raw)?.answers || {}).length;
      } catch {
        return 0;
      }
    }

    root.innerHTML = data.modules
      .map((m) => {
        const done = progressFor(m.id);
        const meta =
          done > 0
            ? `Đã làm ${done}/${m.questions.length} · Tiếp tục`
            : `${m.questions.length} câu hỏi`;
        return `
      <a class="module-card" href="quiz.html?module=${m.id}">
        <div class="num">${m.id}</div>
        <h2>${m.title}</h2>
        <p>Chọn đáp án → xem ngay đúng/sai và kiến thức.</p>
        <div class="meta">${meta}</div>
      </a>`;
      })
      .join("");
  </script>
</body>
</html>
