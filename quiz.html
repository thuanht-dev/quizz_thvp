<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>THVP Quiz</title>
  <link rel="stylesheet" href="quiz.css" />
</head>
<body class="qz">
  <div id="error" class="qz-error hidden"></div>

  <div id="quiz-view" class="qz-shell hidden">
    <header class="qz-header">
      <a class="qz-btn-icon" href="home.html" title="Trang chủ" aria-label="Trang chủ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="qz-header-mid">
        <div class="qz-progress-row">
          <span id="module-eyebrow">Module</span>
          <span id="score-live">0 đúng · 0 sai</span>
          <span id="progress-text">1/120</span>
        </div>
        <div class="qz-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <i id="progress-fill"></i>
        </div>
      </div>
      <div class="qz-header-actions">
        <button type="button" class="qz-btn-icon" id="btn-map" title="Danh sách câu" aria-label="Danh sách câu hỏi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button type="button" class="qz-btn-icon" id="btn-menu" title="Thêm" aria-label="Menu" aria-expanded="false" aria-controls="qz-menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
        </button>
      </div>
    </header>

    <div class="qz-menu hidden" id="qz-menu" role="menu">
      <a id="link-slides" href="#" target="_blank" rel="noopener" role="menuitem">Xem slides lý thuyết</a>
      <button type="button" id="btn-submit" role="menuitem">Xem tổng kết</button>
      <button type="button" id="btn-shuffle" role="menuitem">Xáo trộn lại thứ tự câu</button>
      <button type="button" id="btn-reset" class="danger" role="menuitem">Xóa tiến độ / làm lại</button>
    </div>

    <main class="qz-main" id="qz-scroll">
      <p class="qz-kicker" id="q-label">Câu 1</p>
      <h1 class="qz-prompt" id="q-text"></h1>
      <div class="qz-choices" id="options" role="listbox" aria-label="Đáp án"></div>
      <aside class="qz-fb hidden" id="instant-feedback" aria-live="polite"></aside>
    </main>

    <footer class="qz-footer">
      <button type="button" class="qz-cta ghost" id="btn-prev">Trước</button>
      <button type="button" class="qz-cta primary" id="btn-next">Tiếp</button>
    </footer>
  </div>

  <div class="qz-sheet hidden" id="qz-map" aria-hidden="true">
    <div class="qz-sheet-bg" id="map-backdrop"></div>
    <div class="qz-sheet-panel" role="dialog" aria-label="Danh sách câu hỏi">
      <div class="qz-sheet-head">
        <strong>Danh sách câu</strong>
        <div class="qz-sheet-tools">
          <button type="button" class="qz-chip" id="btn-filter-jump">Tất cả</button>
          <button type="button" class="qz-btn-icon sm" id="btn-close-map" aria-label="Đóng">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div class="qz-grid" id="jump"></div>
    </div>
  </div>

  <section id="result-view" class="qz-result hidden">
    <div class="qz-result-inner">
      <a class="qz-back" href="home.html">← Trang chủ</a>
      <p class="qz-eyebrow">Kết quả</p>
      <h1 id="result-title">Hoàn thành</h1>

      <div class="qz-scorecard">
        <div class="qz-ring" id="score-ring" style="--pct: 0">
          <div id="score-pct">0%</div>
        </div>
        <p class="qz-grade" id="score-grade"></p>
        <p class="qz-summary" id="score-summary"></p>
        <div class="qz-stats">
          <div class="qz-stat ok"><b id="stat-correct">0</b><span>Đúng</span></div>
          <div class="qz-stat bad"><b id="stat-wrong">0</b><span>Sai</span></div>
          <div class="qz-stat"><b id="stat-skip">0</b><span>Chưa làm</span></div>
        </div>
        <div class="qz-result-btns">
          <button type="button" class="qz-cta ghost" id="btn-retry">Làm lại</button>
          <button type="button" class="qz-cta primary" id="btn-review-wrong">Ôn câu sai</button>
        </div>
      </div>

      <div id="review-wrap">
        <div class="qz-review-bar">
          <h2>Chi tiết</h2>
          <div class="qz-filters review-filters">
            <button type="button" class="qz-chip active" data-filter="all">Tất cả</button>
            <button type="button" class="qz-chip" data-filter="wrong">Sai</button>
            <button type="button" class="qz-chip" data-filter="correct">Đúng</button>
            <button type="button" class="qz-chip" data-filter="skip">Chưa làm</button>
          </div>
        </div>
        <div class="qz-review-list" id="review-list"></div>
      </div>
    </div>
  </section>

  <script src="learn-path.js"></script>
  <script src="quiz-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
