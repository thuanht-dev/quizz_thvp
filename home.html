<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THVP – Cổng học tập</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <div class="wrap home-wrap">
    <header class="topbar">
      <div class="brand">THVP <span>Học tập</span></div>
      <nav class="top-nav">
        <a class="btn btn-soft" href="index.html">Tất cả quiz</a>
      </nav>
    </header>

    <p class="eyebrow">Tin học văn phòng</p>
    <h1>Học theo phần · ôn bằng quiz</h1>
    <p class="lede home-lede">
      Mỗi phần: xem slides → làm 120 câu. Chọn đáp án là thấy ngay đúng/sai và giải thích.
    </p>

    <div id="units" class="units"></div>

    <p class="footer-note">Slides Genspark · 720 câu (6 module × 120)</p>
  </div>

  <script src="learn-path.js"></script>
  <script>
    const path = window.LEARN_PATH;

    function progressFor(moduleId) {
      try {
        const raw = localStorage.getItem(`thvp-quiz-m${moduleId}`);
        if (!raw) return null;
        const saved = JSON.parse(raw);
        const n = saved?.answers ? Object.keys(saved.answers).length : 0;
        return n > 0 ? n : null;
      } catch {
        return null;
      }
    }

    document.getElementById("units").innerHTML = path.units
      .map((u) => {
        const mods = u.modules
          .map((m) => {
            const done = progressFor(m.id);
            const status = done
              ? `<span class="mod-progress">Đã làm ${done}/${m.quizCount}</span>`
              : `<span class="mod-progress muted">Chưa bắt đầu</span>`;
            return `
          <div class="unit-mod">
            <div class="unit-mod-info">
              <b>Module ${m.id}</b>
              <span>${m.title}</span>
              ${status}
            </div>
            <a class="btn btn-primary" href="quiz.html?module=${m.id}">
              ${done ? "Tiếp tục" : "Làm quiz"}
            </a>
          </div>`;
          })
          .join("");

        return `
        <section class="unit-card panel" id="${u.id}">
          <div class="unit-head">
            <span class="unit-badge">${u.badge}</span>
            <div>
              <h2>${u.title}</h2>
              <p class="unit-sub">${u.subtitle}</p>
            </div>
          </div>
          <div class="unit-actions-row">
            <a class="slide-link" href="${u.slides.url}" target="_blank" rel="noopener">
              <span class="slide-icon">▶</span>
              <span>
                <strong>${u.slides.label}</strong>
                <small>Lý thuyết trước khi quiz</small>
              </span>
            </a>
          </div>
          <div class="unit-path-label">Quiz module</div>
          ${mods}
        </section>`;
      })
      .join("");
  </script>
</body>
</html>
